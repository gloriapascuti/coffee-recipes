services:
  - type: web
    name: coffee-website
    env: python
    rootDir: backend/coffee_backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input
    startCommand: python manage.py migrate && gunicorn coffee_backend.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: coffee-db
          property: connectionString

  - type: web
    name: coffee-recipes-websites
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://coffee-website-awsc.onrender.com

databases:
  - name: coffee-db
    databaseName: coffee_db
    user: coffee_user
